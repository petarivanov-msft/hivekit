## IDF Component Manager Manifest File
## See: https://docs.espressif.com/projects/idf-component-manager/en/latest/

dependencies:
  idf:
    version: ">=5.5"

  # Zigbee stack (Apache-2.0, v2.x = no more ZBOSS binary blob)
  # SOURCE: https://github.com/espressif/esp-zigbee-sdk
  espressif/esp-zigbee-lib:
    version: "~2.0.0"

  # ZBOSS implementation (required alongside esp-zigbee-lib in v2.x)
  espressif/esp-zboss-lib:
    version: "~2.0.0"

  # Button driver — for BOOT button (pairing / factory reset)
  # SOURCE: https://components.espressif.com/components/espressif/button
  espressif/button:
    version: "^4.0.0"

  # LED indicator — for status LED state machine
  # SOURCE: https://components.espressif.com/components/espressif/led_indicator
  espressif/led_indicator:
    version: "^0.9.0"

  # SCD4x I²C driver from Sensirion via Espressif component registry.
  # TODO (Phase 1): verify the exact component name below.
  # Check: https://components.espressif.com/components?q=scd4x
  # Candidates:
  #   sensirion/scd4x_i2c  (official Sensirion port)
  #   espressif/scd4x      (Espressif's own port, if it exists)
  # If neither exists in the registry, vendor the Sensirion reference driver:
  #   https://github.com/Sensirion/embedded-i2c-scd4x (BSD-3-Clause)
  # Uncomment one of the following:
  # sensirion/scd4x_i2c:
  #   version: "*"
