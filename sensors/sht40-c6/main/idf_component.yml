## IDF Component Manager Manifest File
## See: https://docs.espressif.com/projects/idf-component-manager/en/latest/

dependencies:
  idf:
    version: ">=5.5"

  # Zigbee stack (Apache-2.0). v2.x uses Espressif's own stack.
  # SOURCE: https://github.com/espressif/esp-zigbee-sdk
  espressif/esp-zigbee-lib:
    version: "~2.0.0"

  # Button driver — for BOOT button (pairing / factory reset)
  # SOURCE: https://components.espressif.com/components/espressif/button
  espressif/button:
    version: "^4.0.0"

  # LED indicator — for status LED state machine
  # SOURCE: https://components.espressif.com/components/espressif/led_indicator
  espressif/led_indicator:
    version: "^0.9.0"

  # NOTE: SHT40 driver is hand-written in sensor_sht40.c
  # The Espressif component registry namespace "sensirion" does not exist
  # (verified: 404 at https://components.espressif.com/components/sensirion/sht4x_i2c,
  # 2026-05-30). Sensirion's embedded-sht library targets generic C and requires
  # a HAL shim. A minimal hand-written driver using ESP-IDF i2c_master.h is
  # cleaner, self-contained, and consistent with SCD40/BME280 builds.
  # See sensor_sht40.c for full reasoning.
