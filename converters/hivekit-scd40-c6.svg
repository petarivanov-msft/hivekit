<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background hex -->
  <polygon points="128,16 230,72 230,184 128,240 26,184 26,72"
           fill="#1F4E5F" stroke="#E8A33D" stroke-width="6"/>
  <!-- ESP32 chip silhouette -->
  <rect x="64" y="160" width="128" height="44" rx="4" fill="#2C2C2C" stroke="#888" stroke-width="2"/>
  <rect x="72" y="170" width="112" height="24" rx="2" fill="#1A1A1A"/>
  <!-- chip pins -->
  <g fill="#888">
    <rect x="60" y="172" width="6" height="3"/>
    <rect x="60" y="180" width="6" height="3"/>
    <rect x="60" y="188" width="6" height="3"/>
    <rect x="190" y="172" width="6" height="3"/>
    <rect x="190" y="180" width="6" height="3"/>
    <rect x="190" y="188" width="6" height="3"/>
  </g>
  <!-- CO2 text -->
  <text x="128" y="120" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif"
        font-size="64" font-weight="800" fill="#F5E9D6">CO<tspan font-size="40" dy="12">2</tspan></text>
  <!-- leaf accent -->
  <path d="M 200 56 Q 220 36 240 56 Q 220 76 200 56 Z" fill="#5BA84A"/>
  <path d="M 210 56 Q 220 50 230 56" stroke="#2D5F1F" stroke-width="2" fill="none"/>
</svg>
