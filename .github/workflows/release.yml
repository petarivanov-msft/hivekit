# HiveKit Release & Pages Deploy Workflow
#
# DUAL-CHANNEL PUBLISHING APPROACH
# =================================
# Two channels are served from GitHub Pages:
#
#   Stable  →  https://petarivanov-msft.github.io/hivekit/
#              Triggered by: push of `v*` tags that are NOT pre-releases
#              (pre-release = contains -alpha, -beta, or -rc)
#
#   Dev     →  https://petarivanov-msft.github.io/hivekit/dev/
#              Triggered by: push to `dev` branch OR push of any pre-release tag
#
# DEV ASSET STRATEGY: Single reusable `dev-latest` pre-release
# ---------------------------------------------------
# For the dev channel we maintain a single `dev-latest` pre-release that is
# deleted-and-recreated (or asset-clobbered) on every push to `dev`. The tag
# `dev-latest` is force-pushed each run, so asset URLs are stable:
#   releases/download/dev-latest/hivekit-scd40-c6-dev-latest.bin
# The UI footer still displays a meaningful version (dev-<shortsha>), even
# though the release tag is always `dev-latest`.
#
# WARNING: keep flasher asset lists in sync
# -----------------------------------------
# The "stage flasher" steps below enumerate flasher/ assets explicitly.
# If you add a new file to flasher/, update BOTH stage steps. See CONTRIBUTING.md.
#
# CROSS-CHANNEL PAGES COHERENCE
# --------------------------------
# GitHub Pages has a single deployment target per repo. To avoid each
# channel clobbering the other we:
#   - Stable deploy: fetches the currently-deployed /dev/ subtree from the
#     live Pages URL, merges it into the Pages artifact alongside the fresh
#     stable root, then deploys.
#   - Dev deploy: fetches the currently-deployed root (excluding /dev/) and
#     merges it alongside the fresh /dev/ subtree.
#   - If no prior deployment exists (first run), the missing side is empty.
# This means each channel is idempotent and cross-channel safe.

name: Release & Pages Deploy

on:
  push:
    tags:
      - 'v*'
    branches:
      - dev

permissions: {}

# One concurrency group per channel — never cancel in-flight deploys
concurrency:
  group: pages-${{ (startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-alpha') && !contains(github.ref, '-beta') && !contains(github.ref, '-rc')) && 'stable' || 'dev' }}
  cancel-in-progress: false

env:
  CHIP: esp32c6
  # Merged binary offsets (verified against sensors/*/partitions.csv):
  #   bootloader  → 0x0000  (default ESP32-C6 bootloader offset)
  #   part-table  → 0x8000
  #   factory app → 0x10000
  BOOTLOADER_OFFSET: "0x0"
  PARTITION_OFFSET: "0x8000"
  APP_OFFSET: "0x10000"
  # Space-separated list of sensor IDs — drives loops in release and smoke-check steps.
  # Add new sensors here; download-artifact steps must be updated in parallel.
  SENSORS: "scd40-c6 bme280-c6"

jobs:
  # ------------------------------------------------------------------
  # Determine which channel this run is for
  # ------------------------------------------------------------------
  channel:
    name: Determine channel
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.detect.outputs.channel }}
      version: ${{ steps.detect.outputs.version }}
      dev_display_version: ${{ steps.detect.outputs.dev_display_version }}
      is_stable: ${{ steps.detect.outputs.is_stable }}
      is_dev: ${{ steps.detect.outputs.is_dev }}
    steps:
      - name: Detect channel and version
        id: detect
        run: |
          REF="${GITHUB_REF}"
          TAG="${GITHUB_REF_NAME}"

          IS_STABLE=false
          IS_DEV=false
          CHANNEL=""
          VERSION=""

          if [[ "$REF" == refs/tags/v* ]]; then
            # Tag push — check for pre-release markers
            if echo "$TAG" | grep -qE '-(alpha|beta|rc)'; then
              IS_DEV=true
              CHANNEL=dev
              VERSION="$TAG"
            else
              IS_STABLE=true
              CHANNEL=stable
              VERSION="$TAG"
            fi
          elif [[ "$REF" == refs/heads/dev ]]; then
            IS_DEV=true
            CHANNEL=dev
            SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
            # TAG is always dev-latest for stable asset URLs; display version
            # retains the shortsha so the UI footer shows something meaningful
            VERSION="dev-latest"
            DEV_DISPLAY_VERSION="dev-${SHORT_SHA}"
          else
            echo "Unexpected ref: $REF — skipping"
            exit 1
          fi

          echo "channel=$CHANNEL"                    >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"                    >> "$GITHUB_OUTPUT"
          echo "dev_display_version=$DEV_DISPLAY_VERSION" >> "$GITHUB_OUTPUT"
          echo "is_stable=$IS_STABLE"                >> "$GITHUB_OUTPUT"
          echo "is_dev=$IS_DEV"                      >> "$GITHUB_OUTPUT"

          echo "Channel: $CHANNEL | Version: $VERSION | DisplayVersion: $DEV_DISPLAY_VERSION | Stable: $IS_STABLE | Dev: $IS_DEV"

  # ------------------------------------------------------------------
  # Build firmware — matrix over all sensors
  # ------------------------------------------------------------------
  build:
    name: Build ${{ matrix.sensor }} (${{ needs.channel.outputs.version }})
    needs: channel
    runs-on: ubuntu-latest
    permissions: {}  # build job needs no extra permissions
    strategy:
      fail-fast: false
      matrix:
        sensor: [scd40-c6, bme280-c6]
    outputs:
      # Only one matrix cell's output is used downstream; both cells upload
      # their merged bin as separate named artifacts.
      merged_bin_scd40: ${{ steps.names.outputs.merged_bin }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: recursive

      - name: Compute artifact names
        id: names
        run: |
          VERSION="${{ needs.channel.outputs.version }}"
          MERGED="hivekit-${{ matrix.sensor }}-${VERSION}.bin"
          echo "merged_bin=${MERGED}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"   >> "$GITHUB_OUTPUT"
          echo "sensor_path=sensors/${{ matrix.sensor }}" >> "$GITHUB_OUTPUT"

      - name: Build with espressif/esp-idf-ci-action
        uses: espressif/esp-idf-ci-action@e6f5c74232b1ccd4c97ed641f1e48553853f1fd5 # v1.2.0
        with:
          esp_idf_version: v5.5
          target: ${{ env.CHIP }}
          path: sensors/${{ matrix.sensor }}
          command: idf.py build

      - name: Merge binaries into single flashable .bin
        run: |
          VERSION="${{ needs.channel.outputs.version }}"
          MERGED="hivekit-${{ matrix.sensor }}-${VERSION}.bin"
          SENSOR_PATH_VAL="sensors/${{ matrix.sensor }}"

          # esptool.py is bundled with ESP-IDF; activate the venv
          source /opt/esp/idf/export.sh 2>/dev/null || source ~/.espressif/python_env/*/bin/activate 2>/dev/null || true

          # Fallback: install via pip if not on path
          if ! command -v esptool.py &>/dev/null; then
            pip install esptool --quiet
          fi

          # Resolve the project app binary deterministically via flasher_args.json.
          FLASHER_ARGS="${SENSOR_PATH_VAL}/build/flasher_args.json"
          if [ -f "${FLASHER_ARGS}" ]; then
            APP_BIN=$(python3 .github/scripts/resolve_app_bin.py "${FLASHER_ARGS}")
            if [ -z "${APP_BIN}" ]; then
              echo "ERROR: could not resolve app binary from ${FLASHER_ARGS}" >&2
              exit 1
            fi
            APP_BIN_PATH="${SENSOR_PATH_VAL}/build/${APP_BIN}"
          else
            # Fallback: derive from CMakeLists.txt project() name
            PROJECT_NAME=$(grep -oP 'project\(\K[^)]+' "${SENSOR_PATH_VAL}/CMakeLists.txt" | head -1)
            APP_BIN_PATH="${SENSOR_PATH_VAL}/build/${PROJECT_NAME}.bin"
            echo "flasher_args.json not found; using CMakeLists.txt project name: ${PROJECT_NAME}"
          fi

          if [ ! -f "${APP_BIN_PATH}" ]; then
            echo "ERROR: app binary not found at ${APP_BIN_PATH}" >&2
            exit 1
          fi

          esptool.py --chip ${{ env.CHIP }} merge_bin \
            -o "${MERGED}" \
            ${{ env.BOOTLOADER_OFFSET }} ${SENSOR_PATH_VAL}/build/bootloader/bootloader.bin \
            ${{ env.PARTITION_OFFSET }}  ${SENSOR_PATH_VAL}/build/partition_table/partition-table.bin \
            ${{ env.APP_OFFSET }}        "${APP_BIN_PATH}"

          if [ ! -f "${MERGED}" ]; then
            echo "ERROR: merge_bin did not produce ${MERGED}" >&2
            exit 1
          fi
          echo "Merged binary: $(ls -lh ${MERGED})"

      - name: Upload merged bin artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: merged-bin-${{ matrix.sensor }}
          path: hivekit-${{ matrix.sensor }}-${{ needs.channel.outputs.version }}.bin
          retention-days: 7

      - name: Upload individual firmware artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: firmware-parts-${{ matrix.sensor }}
          path: |
            sensors/${{ matrix.sensor }}/build/bootloader/bootloader.bin
            sensors/${{ matrix.sensor }}/build/partition_table/partition-table.bin
            sensors/${{ matrix.sensor }}/build/*.bin
            sensors/${{ matrix.sensor }}/build/*.elf
          retention-days: 7

  # ------------------------------------------------------------------
  # Publish GitHub Release + attach assets
  # Stable tags → proper release; dev → single reusable dev-latest pre-release
  # ------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [channel, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create/update releases, upload assets
    outputs:
      asset_url_base: ${{ steps.asset_url.outputs.base }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download merged bin artifact (scd40-c6)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: merged-bin-scd40-c6
          path: dist/

      - name: Download merged bin artifact (bme280-c6)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: merged-bin-bme280-c6
          path: dist/

      - name: Download firmware parts artifact (scd40-c6)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: firmware-parts-scd40-c6
          path: dist/parts/scd40-c6/

      - name: Download firmware parts artifact (bme280-c6)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: firmware-parts-bme280-c6
          path: dist/parts/bme280-c6/

      - name: Rename dev binaries to stable asset filenames (dev channel)
        if: needs.channel.outputs.is_dev == 'true'
        run: |
          # Source files use display version; stable asset names always use dev-latest
          for SENSOR in ${{ env.SENSORS }}; do
            SRC_BIN="dist/hivekit-${SENSOR}-${{ needs.channel.outputs.version }}.bin"
            DEST_BIN="dist/hivekit-${SENSOR}-dev-latest.bin"
            if [ -f "${SRC_BIN}" ] && [ "${SRC_BIN}" != "${DEST_BIN}" ]; then
              cp "${SRC_BIN}" "${DEST_BIN}"
              echo "Renamed: ${SRC_BIN} → ${DEST_BIN}"
            fi
          done

      - name: Force-push dev-latest tag (dev channel only)
        if: needs.channel.outputs.is_dev == 'true' && !startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f dev-latest "${GITHUB_SHA}"
          git push origin dev-latest --force

      - name: Create/update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.channel.outputs.version }}"
          IS_STABLE="${{ needs.channel.outputs.is_stable }}"
          DEV_DISPLAY_VERSION="${{ needs.channel.outputs.dev_display_version }}"

          # Build sensor binary file lists from SENSORS env var
          SENSOR_BINS_STABLE=""
          SENSOR_BINS_DEV=""
          SENSOR_ASSET_NOTES=""
          for SENSOR in $SENSORS; do
            SENSOR_BINS_STABLE="${SENSOR_BINS_STABLE} dist/hivekit-${SENSOR}-${VERSION}.bin"
            SENSOR_BINS_DEV="${SENSOR_BINS_DEV} dist/hivekit-${SENSOR}-dev-latest.bin"
            SENSOR_ASSET_NOTES="${SENSOR_ASSET_NOTES}\n- hivekit-${SENSOR}-${VERSION}.bin — ${SENSOR} merged binary, flash at offset 0x0"
          done

          if [[ "$IS_STABLE" == "true" ]]; then
            TAG="${VERSION}"
            TITLE="HiveKit ${VERSION}"
            printf '%s\n' \
              "## HiveKit ${VERSION} — Stable Release" \
              "" \
              "### Firmware assets" \
              "$(printf '%b' "${SENSOR_ASSET_NOTES}")" \
              "- Individual bootloader / partition-table / app .bin files per sensor" \
              "" \
              "### Web flasher" \
              "Visit https://petarivanov-msft.github.io/hivekit/ to flash without a terminal." \
              "" \
              "### Changelog" \
              "See commits between this and the previous release." > /tmp/release_notes.md
            NOTES=$(cat /tmp/release_notes.md)
            # Stable: check first, create only if new, upload if already exists
            if gh release view "${TAG}" >/dev/null 2>&1; then
              gh release upload "${TAG}" $SENSOR_BINS_STABLE dist/parts/*/*.bin dist/parts/*/*.elf --clobber
            else
              gh release create "${TAG}" \
                --title "${TITLE}" \
                --notes "${NOTES}" \
                $SENSOR_BINS_STABLE dist/parts/*/*.bin dist/parts/*/*.elf
            fi
          else
            # Dev channel: single reusable dev-latest pre-release (delete + recreate)
            TAG="dev-latest"
            TITLE="HiveKit ${DEV_DISPLAY_VERSION} (dev-latest)"
            printf '%s\n' \
              "## HiveKit Dev Channel — ${DEV_DISPLAY_VERSION}" \
              "" \
              "Auto-generated from dev branch commit ${GITHUB_SHA}." \
              "" \
              "Asset URL is always stable (tag: dev-latest). Displayed version: ${DEV_DISPLAY_VERSION}." \
              "" \
              "Flash via dev channel: https://petarivanov-msft.github.io/hivekit/dev/" \
              "" \
              "Not for production use." > /tmp/release_notes.md
            NOTES=$(cat /tmp/release_notes.md)
            # Delete the existing dev-latest release (if any) then recreate
            gh release delete dev-latest --yes 2>/dev/null || true
            gh release create dev-latest \
              --title "${TITLE}" \
              --notes "${NOTES}" \
              --prerelease \
              $SENSOR_BINS_DEV dist/parts/*/*.bin dist/parts/*/*.elf
          fi

      - name: Compute asset URL base
        id: asset_url
        run: |
          IS_STABLE="${{ needs.channel.outputs.is_stable }}"
          if [[ "$IS_STABLE" == "true" ]]; then
            VERSION="${{ needs.channel.outputs.version }}"
            BASE="https://github.com/petarivanov-msft/hivekit/releases/download/${VERSION}"
          else
            # Dev channel always serves from dev-latest tag
            BASE="https://github.com/petarivanov-msft/hivekit/releases/download/dev-latest"
          fi
          echo "base=${BASE}" >> "$GITHUB_OUTPUT"

  # ------------------------------------------------------------------
  # Deploy to GitHub Pages (handles cross-channel coherence)
  # ------------------------------------------------------------------
  deploy-pages:
    name: Deploy to GitHub Pages (${{ needs.channel.outputs.channel }})
    needs: [channel, build, release]
    runs-on: ubuntu-latest
    permissions:
      pages: write      # deploy to GitHub Pages
      id-token: write   # OIDC token for Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout (to get flasher/ sources)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # NOTE: deploy-pages only needs flasher source files (from checkout), not
      # the firmware binaries (those are attached to GitHub Releases, not Pages).
      # We deliberately skip downloading merged-bin here.

      - name: Prepare Pages staging directory
        run: mkdir -p _site _site/dev

      - name: Fetch existing stable Pages content (for dev deploy, to avoid clobbering)
        if: needs.channel.outputs.is_dev == 'true'
        run: |
          BASE_URL="https://petarivanov-msft.github.io/hivekit"
          # WARNING: keep in sync with flasher/ asset list — see CONTRIBUTING.md
          FILES="index.html style.css manifest-scd40-c6.json manifest-bme280-c6.json assets/logo.svg assets/favicon.svg"
          for f in $FILES; do
            DIR=$(dirname "_site/$f")
            mkdir -p "$DIR"
            curl -sf "${BASE_URL}/${f}" -o "_site/${f}" 2>/dev/null && echo "Fetched: $f" || echo "Missing (not yet deployed): $f"
          done

      - name: Fetch existing dev Pages content (for stable deploy, to avoid clobbering)
        if: needs.channel.outputs.is_stable == 'true'
        run: |
          BASE_URL="https://petarivanov-msft.github.io/hivekit/dev"
          # WARNING: keep in sync with flasher/ asset list — see CONTRIBUTING.md
          FILES="index.html style.css manifest-scd40-c6-dev.json manifest-bme280-c6-dev.json assets/logo.svg assets/favicon.svg"
          for f in $FILES; do
            DIR=$(dirname "_site/dev/$f")
            mkdir -p "$DIR"
            curl -sf "${BASE_URL}/${f}" -o "_site/dev/${f}" 2>/dev/null && echo "Fetched dev: $f" || echo "Missing dev (not yet deployed): $f"
          done

      - name: Substitute version placeholders and stage flasher (stable)
        if: needs.channel.outputs.is_stable == 'true'
        run: |
          VERSION="${{ needs.channel.outputs.version }}"
          ASSET_BASE="${{ needs.release.outputs.asset_url_base }}"

          # WARNING: keep in sync with flasher/ asset list — see CONTRIBUTING.md
          cp flasher/style.css _site/style.css
          mkdir -p _site/assets
          cp flasher/assets/logo.svg _site/assets/logo.svg
          cp flasher/assets/favicon.svg _site/assets/favicon.svg

          # Substitute placeholders in index.html
          # __MANIFEST__ default → scd40-c6 stable manifest (JS updates on sensor change)
          sed -e "s|__VERSION__|${VERSION}|g" \
              -e "s|__CHANNEL__|stable|g" \
              -e "s|__MANIFEST__|manifest-scd40-c6.json|g" \
              flasher/index.html > _site/index.html

          # Substitute placeholders in stable manifests (all sensors)
          sed -e "s|__VERSION__|${VERSION}|g" \
              -e "s|__ASSET_BASE__|${ASSET_BASE}|g" \
              flasher/manifest-scd40-c6.json > _site/manifest-scd40-c6.json

          sed -e "s|__VERSION__|${VERSION}|g" \
              -e "s|__ASSET_BASE__|${ASSET_BASE}|g" \
              flasher/manifest-bme280-c6.json > _site/manifest-bme280-c6.json

          echo "Staged stable channel: version=${VERSION}"

      - name: Substitute version placeholders and stage flasher (dev)
        if: needs.channel.outputs.is_dev == 'true'
        run: |
          VERSION="${{ needs.channel.outputs.version }}"
          DEV_DISPLAY_VERSION="${{ needs.channel.outputs.dev_display_version }}"
          ASSET_BASE="${{ needs.release.outputs.asset_url_base }}"

          # WARNING: keep in sync with flasher/ asset list — see CONTRIBUTING.md
          mkdir -p _site/dev/assets
          cp flasher/style.css _site/dev/style.css
          cp flasher/assets/logo.svg _site/dev/assets/logo.svg
          cp flasher/assets/favicon.svg _site/dev/assets/favicon.svg

          # Substitute placeholders in index.html for dev channel
          sed -e "s|__VERSION__|${DEV_DISPLAY_VERSION}|g" \
              -e "s|__CHANNEL__|dev|g" \
              -e "s|__MANIFEST__|manifest-scd40-c6-dev.json|g" \
              flasher/index.html > _site/dev/index.html

          # Substitute placeholders in dev manifests (all sensors)
          sed -e "s|__VERSION__|${DEV_DISPLAY_VERSION}|g" \
              -e "s|__ASSET_BASE__|${ASSET_BASE}|g" \
              flasher/manifest-scd40-c6-dev.json > _site/dev/manifest-scd40-c6-dev.json

          sed -e "s|__VERSION__|${DEV_DISPLAY_VERSION}|g" \
              -e "s|__ASSET_BASE__|${ASSET_BASE}|g" \
              flasher/manifest-bme280-c6-dev.json > _site/dev/manifest-bme280-c6-dev.json

          echo "Staged dev channel: display_version=${DEV_DISPLAY_VERSION} asset_base=${ASSET_BASE}"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5

      - name: Smoke-check stable deployment
        if: needs.channel.outputs.is_stable == 'true'
        run: |
          VERSION="${{ needs.channel.outputs.version }}"
          # Retry up to 6 times with 10s delay to allow Pages CDN propagation
          for SENSOR in ${{ env.SENSORS }}; do
            URL="https://petarivanov-msft.github.io/hivekit/manifest-${SENSOR}.json"
            echo "Smoke-checking ${URL}..."
            OK=false
            for attempt in 1 2 3 4 5 6; do
              echo "  attempt ${attempt}/6..."
              DEPLOYED_VER=$(curl -sf "${URL}" | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])" 2>/dev/null)
              if [[ "${DEPLOYED_VER}" == "${VERSION}" ]]; then
                echo "  Smoke check passed: ${URL} → version=${DEPLOYED_VER}"
                OK=true
                break
              fi
              echo "  Not yet propagated (got '${DEPLOYED_VER}', want '${VERSION}'). Waiting 10s..."
              [ $attempt -lt 6 ] && sleep 10
            done
            if [[ "$OK" != "true" ]]; then
              echo "ERROR: Smoke check failed after 6 attempts. Expected '${VERSION}' at ${URL}" >&2
              exit 1
            fi
          done

      - name: Smoke-check dev deployment
        if: needs.channel.outputs.is_dev == 'true'
        run: |
          DEV_DISPLAY_VERSION="${{ needs.channel.outputs.dev_display_version }}"
          # Retry up to 6 times with 10s delay to allow Pages CDN propagation
          for SENSOR in ${{ env.SENSORS }}; do
            URL="https://petarivanov-msft.github.io/hivekit/dev/manifest-${SENSOR}-dev.json"
            echo "Smoke-checking ${URL}..."
            OK=false
            for attempt in 1 2 3 4 5 6; do
              echo "  attempt ${attempt}/6..."
              DEPLOYED_VER=$(curl -sf "${URL}" | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])" 2>/dev/null)
              if [[ "${DEPLOYED_VER}" == "${DEV_DISPLAY_VERSION}" ]]; then
                echo "  Smoke check passed: ${URL} → version=${DEPLOYED_VER}"
                OK=true
                break
              fi
              echo "  Not yet propagated (got '${DEPLOYED_VER}', want '${DEV_DISPLAY_VERSION}'). Waiting 10s..."
              [ $attempt -lt 6 ] && sleep 10
            done
            if [[ "$OK" != "true" ]]; then
              echo "ERROR: Smoke check failed after 6 attempts. Expected '${DEV_DISPLAY_VERSION}' at ${URL}" >&2
              exit 1
            fi
          done
