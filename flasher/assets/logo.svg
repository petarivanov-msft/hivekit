<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 40" width="180" height="40" role="img" aria-label="HiveKit">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6A1B9A"/>
      <stop offset="50%"  stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
  </defs>
  <!-- Hexagon icon (bee/hive motif) -->
  <polygon points="18,4 30,10 30,26 18,32 6,26 6,10"
           fill="url(#logo-grad)" opacity="0.95"/>
  <!-- H letter in hexagon -->
  <text x="18" y="23" font-family="Inter, Arial, sans-serif" font-size="15"
        font-weight="800" text-anchor="middle" fill="white">H</text>
  <!-- Wordmark -->
  <text x="40" y="27" font-family="Inter, Arial, sans-serif" font-size="22"
        font-weight="700" fill="url(#logo-grad)" letter-spacing="-0.5">HiveKit</text>
</svg>
